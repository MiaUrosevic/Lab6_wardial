name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  doctest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run doctests
        run: python -m doctest wardial.py -v
        